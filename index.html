<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゴールボールサーチゲーム</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f0f0; padding: 20px; }
        .hidden { display: none; }
        button { 
            padding: 20px 40px; font-size: 1.5rem; margin: 10px; cursor: pointer;
            border-radius: 10px; border: none; background-color: #4CAF50; color: white;
        }
        button:hover { background-color: #45a049; }
        #statusArea { font-size: 1.2rem; margin: 20px; min-height: 1.5em; color: #333; }
        #currentInput { font-size: 3rem; font-weight: bold; color: #e91e63; }
        #rankingArea { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: 20px auto; }
    </style>
</head>
<body>

    <h1>ゴールボールサーチゲーム なのだ！</h1>

    <div id="modeSelection">
        <button onclick="checkSound()">左右の音を確認する</button><br>
        <button onclick="startPractice()">練習モード（5問）</button>
        <button onclick="startChampionship()">選手権モード（無限）</button>
    </div>

    <div id="gameArea" class="hidden">
        <div id="statusArea">準備ができたらスタートなのだ</div>
        <div id="currentInput">-</div>
        <p>※マイクがオンになったら番号を答えてね！</p>
    </div>

    <div id="rankingArea" class="hidden">
        <h2>結果発表</h2>
        <p>スコア: <span id="finalScore">0</span> 点</p>
        
        <div id="scoreSubmitArea" style="display:none;">
            <input type="text" id="nameInput" placeholder="お名前を入力（音声も可）" style="padding:10px; font-size:1rem;">
            <button onclick="startVoiceInput()">声で名前を入れる</button>
            <button onclick="submitScore()" style="background-color: #2196F3;">スコアを送信する</button>
        </div>

        <div id="rankingList">
            </div>
        <button onclick="location.reload()" style="background-color: #9e9e9e;">タイトルに戻る</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
