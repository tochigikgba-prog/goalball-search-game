<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゴールボールサーチゲーム</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #000; 
            color: #fff;
            padding: 10px;
            margin: 0;
            /* 画面全体のどこを触っても反応しやすくするための設定 */
            min-height: 100vh;
        }
        h1 { font-size: 1.8rem; color: #ffffff; }
        .hidden { display: none; }
        
        /* ボタンを大きく押しやすく（スマホ・インクルーシブ対応） */
        button { 
            display: block;
            width: 90%; 
            max-width: 400px;
            min-height: 80px; 
            margin: 20px auto; 
            font-size: 1.5rem; 
            font-weight: bold;
            cursor: pointer;
            border-radius: 15px; 
            border: none; 
            background-color: #333333; 
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); background-color: #444444; }
        
        /* 停止ボタン用の赤色 */
        .btn-stop { background-color: #b71c1c; }
        
        #statusArea { 
            font-size: 1.4rem; 
            margin: 20px; 
            min-height: 2em; 
            color: #ffffff; 
            background: #111111;
            padding: 15px;
            border-radius: 10px;
        }
        #currentInput { font-size: 4rem; font-weight: bold; color: #ffd54f; margin: 10px; }
        #rankingArea { 
            background: #111111; 
            padding: 20px; 
            border-radius: 15px; 
            max-width: 500px; 
            margin: 20px auto; 
        }
        input#nameInput {
            width: 80%;
            padding: 15px;
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #444444;
            background: #222222;
            color: #ffffff;
        }
        .btn-back {
            position: fixed;
            top: 12px;
            right: 12px;
            background: #444444;
            color: #ffffff;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 1rem;
            z-index: 999;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>ゴールボールサーチゲーム</h1>
    <div id="statusArea">準備ができたらスタート</div>
    <button class="btn-back" onclick="goHome()" aria-label="もどる">もどる</button>

    <div id="modeSelection">
        
        <button onclick="checkSound()">左右の音を確認する</button>
        <button onclick="stopAllSounds()" class="btn-stop">音を止める</button>
        
        <hr style="margin: 30px 0; border: 1px solid #ccc;">
        
        <button onclick="startPractice()">練習モード（5問）</button>
        <button onclick="startChampionship()">選手権モード（無限）</button>
    </div>

    <div id="gameArea" class="hidden">
        
        <div id="currentInput">-</div>
        <p>※音が終わったらマイクに番号を言ってね！</p>
        <button onclick="stopAllSounds()" class="btn-stop">ゲームを中断して止める</button>
    </div>

    <div id="rankingArea" class="hidden">
        <h2>結果発表</h2>
        <p style="font-size: 2rem;">スコア: <span id="finalScore">0</span> 点</p>
        
        <div id="scoreSubmitArea" style="display:none;">
            <input type="text" id="nameInput" placeholder="お名前を入力">
            <button onclick="startVoiceInput()" style="background-color: #ff9800;">声でお名前を入力</button>
            <button onclick="submitScore()" style="background-color: #2196F3;">スコアを送信する</button>
        </div>

        <div id="rankingList" style="text-align: left; margin: 20px 0;">
            </div>
        <button onclick="location.reload()" style="background-color: #9e9e9e;">タイトルに戻る</button>
    </div>

    <script src="script_v2.js"></script>
</body>
</html>
