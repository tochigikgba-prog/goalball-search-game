<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゴールボールサーチゲーム</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #000; 
            color: #fff;
            padding: 10px;
            margin: 0;
            /* 画面全体のどこを触っても反応しやすくするための設定 */
            min-height: 100vh;
        }
        h1 { font-size: 1.8rem; color: #ffffff; }
        .hidden { display: none; }
        
        /* ボタンを大きく押しやすく（スマホ・インクルーシブ対応） */
        button { 
            display: block;
            width: 90%; 
            max-width: 400px;
            min-height: 80px; 
            margin: 20px auto; 
            font-size: 1.5rem; 
            font-weight: bold;
            cursor: pointer;
            border-radius: 15px; 
            border: none; 
            background-color: #333333; 
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); background-color: #444444; }
        
        /* 停止ボタン用の赤色 */
        .btn-stop { background-color: #b71c1c; }
        
        #statusArea { 
            font-size: 1.4rem; 
            margin: 20px; 
            min-height: 2em; 
            color: #ffffff; 
            background: #111111;
            padding: 15px;
            border-radius: 10px;
        }
        #currentInput { font-size: 4rem; font-weight: bold; color: #ffd54f; margin: 10px; }
        #rankingArea { 
            background: #111111; 
            padding: 20px; 
            border-radius: 15px; 
            max-width: 500px; 
            margin: 20px auto; 
        }
        input#nameInput {
            width: 80%;
            padding: 15px;
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #444444;
            background: #222222;
            color: #ffffff;
        }
        .answer-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 10px auto 20px;
            max-width: 440px;
        }
        .answer-buttons button {
            width: 30%;
            min-width: 90px;
            min-height: 60px;
            font-size: 1.2rem;
            background-color: #555555;
        }
        .answer-buttons.hidden {
            display: none;
        }
        .btn-back {
            display: none;
            position: fixed;
            top: 12px;
            right: 12px;
            background: #444444;
            color: #ffffff;
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 0.9rem;
            z-index: 999;
            border: 1px solid #666666;
            cursor: pointer;
            width: auto;
            min-height: auto;
            margin: 0;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>ゴールボールサーチゲーム</h1>
    <!-- moved: statusArea will appear above 練習モード button per request -->
    <!-- マイク許可をユーザー操作で促すボタン（iPhone向け） -->
    <button id="preMicBtn" type="button" onclick="handlePreMicClick()" style="background-color:#ffb300; color:#000; z-index:1000; pointer-events:auto;" aria-label="マイクを許可する">最初にマイクを許可しよう</button>
    <button id="backButton" class="btn-back" style="display:none" onclick="goHome()" aria-label="もどる">もどる</button>

    <div id="modeSelection">
        
        <button onclick="checkSound()">左右の音を確認する</button>
        <button onclick="stopAllSounds()" class="btn-stop">音を止める</button>
        
        <hr style="margin: 30px 0; border: 1px solid #ccc;">

        <div id="statusArea" role="status" aria-live="polite" aria-atomic="true" style="margin-bottom:12px;">準備ができたらスタート</div>

        <button onclick="startPractice()">練習モード（5問）</button>
        <button onclick="startChampionship()">選手権モード（無限）</button>
    </div>

    <div id="gameArea" class="hidden">
        <div id="currentInput">-</div>
        <p id="answerModeHint">※どこかを聞かれたらマイクに向かって番号を言ってね！</p>
        <div id="answerButtons" class="answer-buttons hidden" aria-label="回答ボタン">
            <button onclick="inputAnswer(0)">0</button>
            <button onclick="inputAnswer(1)">1</button>
            <button onclick="inputAnswer(2)">2</button>
            <button onclick="inputAnswer(3)">3</button>
            <button onclick="inputAnswer(4)">4</button>
            <button onclick="inputAnswer(4.5)">4.5</button>
            <button onclick="inputAnswer(5)">5</button>
            <button onclick="inputAnswer(6)">6</button>
            <button onclick="inputAnswer(7)">7</button>
            <button onclick="inputAnswer(8)">8</button>
            <button onclick="inputAnswer(9)">9</button>
        </div>
        <button onclick="stopAllSounds()" class="btn-stop">ゲームを中断して止める</button>
        <button onclick="endGame()" style="background-color:#2196F3;">終了してスコアを保存</button>
    </div>

    <div id="rankingArea" class="hidden">
        <h2>結果発表</h2>
        <p style="font-size: 2rem;">スコア: <span id="finalScore">0</span> 点</p>
        
        <div id="scoreSubmitArea" style="display:none;">
            <input type="text" id="nameInput" placeholder="お名前を入力">
            <button onclick="startVoiceInput()" style="background-color: #ff9800;">声でお名前を入力</button>
            <button onclick="submitScore()" style="background-color: #2196F3;">スコアを送信する</button>
        </div>

        <div id="rankingStatus" role="status" aria-live="polite" style="margin-bottom:10px; min-height:1.2em;">ランキングを読み込んでいません</div>
        <div id="rankingList" style="text-align: left; margin: 20px 0;">
        </div>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <button onclick="loadRanking()" style="background-color:#4caf50;">ランキングを更新</button>
            <button onclick="location.reload()" style="background-color: #9e9e9e;">タイトルに戻る</button>
        </div>
    </div>

    <script src="script_v2.js"></script>
    <footer style="margin-top:30px; padding:20px 0; color:#bbb; font-size:0.9rem; text-align:center;">
        <div style="max-width:900px; margin:0 auto;">
            <div>Thanks；<a href="https://goalball-kanagawa.org/" target="_blank" rel="noopener" style="color:#fff; text-decoration:underline;">KGBA</a>　｜　ずんだもん/VOICEVOX</div>
            <div style="margin-top:6px;">(C) 2026 コドモガジェット All Rights Reserved</div>
        </div>
    </footer>
</body>
</html>
